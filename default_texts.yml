
- name: 片段0
  text: |
    您好，合力亿捷。
    您那个电脑上有向日葵吗？
    我远程给您看一下。
    装不了这个是吗？
    行，那我试一下吧，我在我电脑上试一下，稍后我给您回电。
    好的，再见。


- name: 片段1
  text: |
    对吧~我就特别喜欢这种超市，
    尤其是过年的时候,
    去逛超市
    就会觉得
    超级超级开心！
    想买好多好多的东西呢

- name: 片段2
  text: |
    这个记者俱乐部将成为该部门发放资讯的唯一渠道

- name: 片段3
  text: |
    夏天走了，秋天要来了。
    树叶黄了，一片片叶子从树上落下来。
    有一天，我起的很早去钓鱼。
    晚饭后出去散步，走着走着又到了这里。
    他等啊等，一直不见汽车等影子。
    李四光是我国著名的地质学家。
    再睡一分钟吧，不会迟到的。
    他每天到公园散步。
    这座桥不但坚固，而且美观。

- name: 片段4
  text: |
    我画了个红红的太阳。
    爸爸晚上便要拉我去散步。
    我正找你呢，今天晚上有什么事情吗？
    人们端午节吃粽子，是为了纪念爱国诗人屈原。
    雨停了，天上有一座美丽的桥。
    忽然一声雷响，大雨真的下起来了。
    妈妈说，你怎么天天丢东西呢？

- name: 片段5
  text: |
    今天你迟到了20分钟。
    他们躲到大树下乘凉，有的唱歌，有的睡觉。
    冬天到了，西北风呼呼地刮起来。
    我玩累了，就找个阴凉的地方睡着了。
    鲁迅的文章内涵丰富令人回味无穷。
    我们应怀有一颗感恩的心。
    健康的皮肤富有光泽和弹性。
