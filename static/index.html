<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声音复刻平台</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f1f5f9;
    color: #1e293b;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, #1e293b, #334155);
    color: #fff;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.2);
  }

  header h1 { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
  header span { font-size: 13px; opacity: .6; }

  .hero {
    text-align: center;
    padding: 64px 24px 32px;
  }

  .hero h2 {
    font-size: 28px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 10px;
  }

  .hero p {
    font-size: 15px;
    color: #64748b;
  }

  .cards {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 40px 24px 80px;
    flex-wrap: wrap;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 36px;
    width: 340px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    text-decoration: none;
    color: inherit;
    transition: transform .2s, box-shadow .2s;
    border: 2px solid transparent;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(0,0,0,.14);
  }

  .card-icon {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    font-size: 32px;
  }

  .card-qwen .card-icon {
    background: linear-gradient(135deg, #ede9fe, #ddd6fe);
  }

  .card-qwen:hover {
    border-color: #7c3aed;
  }

  .card-cosy .card-icon {
    background: linear-gradient(135deg, #cffafe, #a5f3fc);
  }

  .card-cosy:hover {
    border-color: #0891b2;
  }

  .card h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .card-qwen h3 { color: #5b21b6; }
  .card-cosy h3 { color: #0e7490; }

  .card p {
    font-size: 13px;
    color: #64748b;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .card-btn {
    display: inline-block;
    padding: 10px 28px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
  }

  .card-qwen .card-btn {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
  }

  .card-cosy .card-btn {
    background: linear-gradient(135deg, #0891b2, #0e7490);
  }

  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    margin-bottom: 14px;
  }

  .card-qwen .tag {
    background: #ede9fe;
    color: #6d28d9;
  }

  .card-cosy .tag {
    background: #cffafe;
    color: #0e7490;
  }

  footer {
    margin-top: auto;
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: #94a3b8;
  }
</style>
</head>
<body>
