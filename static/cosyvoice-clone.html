<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CosyVoice 声音复刻</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f1f5f9;
    color: #1e293b;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: linear-gradient(135deg, #0891b2, #0e7490);
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(8,145,178,.35);
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
  header span { font-size: 13px; opacity: .75; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #fff;
  }
  .panel:first-child { border-right: 1px solid #e2e8f0; }

  .panel-header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  textarea#tts-text {
    width: 100%;
    height: 200px;
    min-height: 200px;
    flex-shrink: 0;
    padding: 10px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    resize: vertical;
    color: #1e293b;
    line-height: 1.6;
    transition: border-color .2s;
    font-family: inherit;
  }
  textarea#tts-text:focus { outline: none; border-color: #0891b2; }
  textarea#tts-text::placeholder { color: #94a3b8; }

  .options-row {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }
  .option-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .option-group label { font-size: 13px; color: #64748b; font-weight: 500; }

  .radio-group {
    display: flex;
    gap: 0;
    border: 1.5px solid #e2e8f0;
    border-radius: 6px;
    overflow: hidden;
  }
  .radio-group label {
    padding: 5px 12px;
    font-size: 13px;
    color: #475569;
    cursor: pointer;
    transition: background .15s, color .15s;
    user-select: none;
  }
  .radio-group input { display: none; }
  .radio-group input:checked + label { background: #0891b2; color: #fff; }
  .radio-group label:hover { background: #f1f5f9; }
  .radio-group input:checked + label:hover { background: #0e7490; }

  .rate-row {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .rate-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 130px;
  }
  .rate-group label {
    font-size: 13px;
    color: #64748b;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
  }
  .rate-group label span { color: #0891b2; font-weight: 600; }
  .rate-group input[type=range] {
    width: 100%;
    accent-color: #0891b2;
    cursor: pointer;
    height: 4px;
  }
  .rate-ticks {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #94a3b8;
    margin-top: -2px;
  }

  select.sample-rate {
    padding: 5px 10px;
    border: 1.5px solid #e2e8f0;
    border-radius: 6px;
    font-size: 13px;
    color: #475569;
    background: #fff;
    cursor: pointer;
    outline: none;
  }
  select.sample-rate:focus { border-color: #0891b2; }

  .divider { height: 1px; background: #f1f5f9; margin: 2px 0; }

  .voice-list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .voice-list-header span { font-size: 13px; font-weight: 600; color: #475569; }

  #voice-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .voice-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    transition: border-color .2s, box-shadow .2s;
    background: #fafafa;
  }
  .voice-item:hover { border-color: #a5f3fc; box-shadow: 0 1px 4px rgba(8,145,178,.1); }
  .voice-item.playing { border-color: #0891b2; background: #ecfeff; }

  .voice-info { flex: 1; min-width: 0; }
  .voice-name { font-size: 14px; font-weight: 600; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .voice-id { font-size: 11px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; display: block; margin-top: 2px; }
  .voice-model { font-size: 11px; color: #67e8f9; display: block; margin-top: 1px; font-family: monospace; }

  .status-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    margin-top: 3px;
  }
  .status-ok { background: #dcfce7; color: #166534; }
  .status-deploying { background: #fef3c7; color: #92400e; }
  .status-undeployed { background: #fee2e2; color: #991b1b; }

  .voice-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    margin-left: 10px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-primary { background: #0891b2; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #0e7490; }
  .btn-success { background: #10b981; color: #fff; }
  .btn-success:hover:not(:disabled) { background: #059669; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover:not(:disabled) { background: #dc2626; }
  .btn-ghost { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; }
  .btn-ghost:hover:not(:disabled) { background: #e2e8f0; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-lg { padding: 10px 20px; font-size: 14px; width: 100%; justify-content: center; }

  .empty-state { text-align: center; padding: 32px 16px; color: #94a3b8; font-size: 14px; }
  .empty-state svg { margin-bottom: 8px; opacity: .4; }

  .upload-area {
    border: 2px dashed #e2e8f0;
    border-radius: 10px;
    padding: 16px;
    transition: border-color .2s;
  }
  .upload-area:hover { border-color: #a5f3fc; }

  .upload-row { display: flex; gap: 8px; align-items: center; }

  .file-input-wrap { position: relative; flex: 1; }
  .file-input-wrap input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
  .file-input-label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 6px;
    font-size: 13px;
    color: #475569;
    background: #f8fafc;
    cursor: pointer;
    transition: border-color .2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  select#history-select {
    flex: 1;
    padding: 7px 10px;
    border: 1.5px solid #e2e8f0;
    border-radius: 6px;
    font-size: 13px;
    color: #475569;
    background: #fff;
    outline: none;
    max-width: 200px;
  }
  select#history-select:focus { border-color: #0891b2; }

  .waveform-wrap {
    position: relative;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    overflow: hidden;
    background: #f8fafc;
    cursor: crosshair;
  }
  #waveform { display: block; width: 100%; height: 100px; }

  .waveform-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0 0;
  }
  .time-info { font-size: 12px; color: #64748b; font-family: monospace; }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 13px; font-weight: 500; color: #475569; }
  .form-group input, .form-group select {
    padding: 8px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    color: #1e293b;
    outline: none;
    transition: border-color .2s;
    background: #fff;
  }
  .form-group input:focus, .form-group select:focus { border-color: #0891b2; }
  .form-group input.invalid { border-color: #ef4444; }
  .form-hint { font-size: 11px; color: #94a3b8; margin-top: 2px; }

  #toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px; z-index: 9999;
  }
  .toast {
    padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
    color: #fff; box-shadow: 0 4px 12px rgba(0,0,0,.15);
    animation: slideIn .25s ease; max-width: 320px;
  }
  .toast.success { background: #10b981; }
  .toast.error { background: #ef4444; }
  .toast.info { background: #0891b2; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-badge { font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 5px; }
  .dot-anim { animation: blink 1.2s step-start infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
  </svg>
  <h1>CosyVoice 声音复刻</h1>
  <span>阿里云百炼 · CosyVoice TTS Voice Cloning</span>
</header>

<div class="main">

  <!-- ===== Left Panel ===== -->
  <div class="panel">
    <div class="panel-header">
      <h2>TTS 播放</h2>
      <div id="tts-status" class="loading-badge" style="display:none">
        <div class="spinner" style="border-color:rgba(8,145,178,.3);border-top-color:#0891b2"></div>
        <span>合成中<span class="dot-anim">…</span></span>
      </div>
    </div>
    <div class="panel-body">

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <select id="default-text-select" style="flex:1;padding:5px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;color:#475569;background:#fff;cursor:pointer" onchange="onDefaultTextSelect(this)">
          <option value="">示例文本…</option>
        </select>
      </div>
      <textarea id="tts-text" placeholder="在此输入要播放的文本&#10;支持多行，逐行模式会按换行符分段合成"></textarea>

      <div class="options-row">
        <div class="option-group">
          <label>输入模式</label>
          <div class="radio-group">
            <input type="radio" name="play-mode" id="mode-line" value="line" checked>
            <label for="mode-line">逐行输入</label>
            <input type="radio" name="play-mode" id="mode-char" value="char">
            <label for="mode-char">逐字输入</label>
          </div>
        </div>
        <div class="option-group">
          <label>采样率</label>
          <select class="sample-rate" id="sample-rate">
            <option value="8000" selected>8000 Hz</option>
            <option value="16000">16000 Hz</option>
            <option value="24000">24000 Hz</option>
          </select>
        </div>
      </div>

      <div class="rate-row" style="margin-top:10px;">
        <div class="rate-group">
          <label>语速 <span id="speech-rate-val">1.0</span></label>
          <input type="range" id="speech-rate" min="0.5" max="2" step="0.1" value="1.0"
            oninput="document.getElementById('speech-rate-val').textContent=parseFloat(this.value).toFixed(1)">
          <div class="rate-ticks"><span>0.5×</span><span>1.0×</span><span>2.0×</span></div>
        </div>
        <div class="rate-group">
          <label>语调 <span id="pitch-rate-val">1.0</span></label>
          <input type="range" id="pitch-rate" min="0.5" max="2" step="0.1" value="1.0"
            oninput="document.getElementById('pitch-rate-val').textContent=parseFloat(this.value).toFixed(1)">
          <div class="rate-ticks"><span>0.5×</span><span>1.0×</span><span>2.0×</span></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="voice-list-header">
        <span>音色列表</span>
        <button class="btn btn-ghost btn-sm" onclick="loadVoices()" id="btn-refresh">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          刷新
        </button>
      </div>

      <div id="voice-list">
        <div class="empty-state">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <div>加载中…</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ===== Right Panel ===== -->
  <div class="panel">
    <div class="panel-header">
      <h2>创建音色</h2>
    </div>
    <div class="panel-body">

      <div class="upload-area">
        <div class="upload-row">
          <div class="file-input-wrap">
            <input type="file" id="audio-file-input" accept=".mp3,.wav,.m4a,.MP3,.WAV,.M4A" onchange="onFileSelected(this)">
            <div class="file-input-label" id="file-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              上传音频
            </div>
          </div>
          <select id="history-select" onchange="onHistorySelect(this)">
            <option value="">历史音频…</option>
          </select>
        </div>
      </div>

      <div>
        <div class="waveform-wrap" id="waveform-wrap">
          <canvas id="waveform"></canvas>
        </div>
        <div class="waveform-controls">
          <span class="time-info" id="clip-time" style="color:#ef4444;">请上传音频文件，剪辑后需要大鱼30秒的连续音频。</span>
    
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" id="btn-preview" onclick="togglePreview()" disabled>
              ▶ 试听片段
            </button>
            <button class="btn btn-ghost btn-sm" onclick="resetClip()" id="btn-reset-clip" disabled>
              重置剪辑
            </button>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>音色名称（仅限小写字母和数字，最多 10 个字符）</label>
        <input type="text" id="voice-name" placeholder="例如：myvoice01" pattern="[a-z0-9]+" maxlength="10">
        <div class="form-hint">建议 10~30 秒的清晰人声音频，支持 WAV / MP3 / M4A</div>
      </div>

      <div class="form-group">
        <label>TTS 模型</label>
        <select id="tts-model-select">
          <option value="cosyvoice-v3.5-plus" selected>cosyvoice-v3.5-plus</option>
          <option value="cosyvoice-v3.5-flash">cosyvoice-v3.5-flash</option>
        </select>
      </div>

      <button class="btn btn-primary btn-lg" id="btn-create" onclick="createVoice()" disabled>
        创建音色
      </button>

    </div>
  </div>

</div>

<div id="toast-container"></div>

<script>
// ===== State =====
let voices = [];
let audioBuffer = null;
let waveformData = null;
let audioDuration = 0;
let clipStart = 0;
let clipEnd = 0;
let dragging = null;
let audioCtx = null;
let previewSource = null;
let currentAudioFile = null;

let isPlayingTTS = false;
let ttsAbortController = null;
let currentPlayingVoiceId = null;

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  loadVoices();
  loadHistory();
  loadDefaultTexts();
  initCanvas();
});

// ===== Toast =====
function toast(msg, type = 'info', duration = 3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ===== Voice List =====
async function loadVoices() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true;
  try {
    const resp = await fetch('/api/cosyvoice/voices');
    const data = await resp.json();
    voices = data.voices || [];
    renderVoiceList();
  } catch (e) {
    toast('加载音色列表失败', 'error');
  } finally {
    btn.disabled = false;
  }
}

function renderVoiceList() {
  const list = document.getElementById('voice-list');
  if (!voices.length) {
    list.innerHTML = `<div class="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/>
      </svg>
      <div>暂无音色，请先在右侧创建</div>
    </div>`;
    return;
  }
  list.innerHTML = voices.map(v => {
    const displayName = v.display_name || v.voice_id;
    const model = v.target_model || 'cosyvoice-v3.5-plus';
    const status = v.status || 'OK';
    const safeId = escHtml(v.voice_id);
    const safeModel = escHtml(model);
    const statusClass = status === 'OK' ? 'status-ok' : status === 'DEPLOYING' ? 'status-deploying' : 'status-undeployed';
    const statusLabel = status === 'OK' ? '可用' : status === 'DEPLOYING' ? '审核中' : '审核未通过';
    const canPlay = status === 'OK';
    return `
    <div class="voice-item" id="voice-${safeId}">
      <div class="voice-info">
        <span class="voice-name">${escHtml(displayName)}</span>
        <span class="voice-id">${safeId}</span>
        <span class="voice-model">${safeModel}</span>
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <div class="voice-actions">
        ${canPlay ? `<button class="btn btn-success btn-sm" id="play-btn-${safeId}"
          onclick="toggleVoicePlay('${safeId}', '${safeModel}')">
          ▶ 播放
        </button>` : `<button class="btn btn-ghost btn-sm" onclick="refreshVoiceStatus('${safeId}')">
          ↻ 刷新状态
        </button>`}
        <button class="btn btn-danger btn-sm" onclick="deleteVoice('${safeId}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== Refresh single voice status =====
async function refreshVoiceStatus(voiceId) {
  try {
    const resp = await fetch(`/api/cosyvoice/voices/${encodeURIComponent(voiceId)}/status`);
    const data = await resp.json();
    const v = voices.find(x => x.voice_id === voiceId);
    if (v) v.status = data.status;
    renderVoiceList();
    if (data.status === 'OK') toast('音色审核通过，可以使用了！', 'success');
    else if (data.status === 'UNDEPLOYED') toast('音色审核未通过', 'error');
    else toast('音色仍在审核中，请稍后再试', 'info');
  } catch (e) {
    toast(`查询状态失败: ${e.message}`, 'error');
  }
}

// ===== TTS Playback =====
async function toggleVoicePlay(voiceId, targetModel) {
  if (isPlayingTTS) {
    stopTTS();
    return;
  }

  const text = document.getElementById('tts-text').value.trim();
  if (!text) {
    toast('请先在左上方输入要播放的文本', 'error');
    return;
  }

  const mode = document.querySelector('input[name="play-mode"]:checked').value;
  const sampleRate = parseInt(document.getElementById('sample-rate').value);
  const speechRate = parseFloat(document.getElementById('speech-rate').value);
  const pitchRate = parseFloat(document.getElementById('pitch-rate').value);

  isPlayingTTS = true;
  currentPlayingVoiceId = voiceId;
  ttsAbortController = new AbortController();

  const btn = document.getElementById(`play-btn-${voiceId}`);
  const item = document.getElementById(`voice-${voiceId}`);
  if (btn) btn.textContent = '⬛ 停止';
  if (item) item.classList.add('playing');
  document.getElementById('tts-status').style.display = 'flex';

  try {
    await playTTSRequest(text, voiceId, targetModel, sampleRate, mode, speechRate, pitchRate, ttsAbortController.signal);
  } catch (e) {
    if (e.name !== 'AbortError') toast(`TTS 播放失败: ${e.message}`, 'error');
  } finally {
    isPlayingTTS = false;
    currentPlayingVoiceId = null;
    if (btn) btn.textContent = '▶ 播放';
    if (item) item.classList.remove('playing');
    document.getElementById('tts-status').style.display = 'none';
  }
}

function stopTTS() {
  isPlayingTTS = false;
  if (ttsAbortController) ttsAbortController.abort();
  const voiceId = currentPlayingVoiceId;
  if (voiceId) {
    const btn = document.getElementById(`play-btn-${voiceId}`);
    const item = document.getElementById(`voice-${voiceId}`);
    if (btn) btn.textContent = '▶ 播放';
    if (item) item.classList.remove('playing');
  }
  document.getElementById('tts-status').style.display = 'none';
}

async function playTTSRequest(text, voice, model, sampleRate, mode, speechRate, pitchRate, signal) {
  const resp = await fetch('/api/cosyvoice/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, voice, model, sample_rate: sampleRate, mode, speech_rate: speechRate, pitch_rate: pitchRate }),
    signal,
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
    throw new Error(err.detail || resp.statusText);
  }
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);
  return new Promise((resolve, reject) => {
    const audio = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
    audio.onerror = () => { URL.revokeObjectURL(url); reject(new Error('播放失败')); };
    audio.play().catch(reject);
    signal.addEventListener('abort', () => { audio.pause(); URL.revokeObjectURL(url); resolve(); });
  });
}

// ===== Delete Voice =====
async function deleteVoice(voiceId) {
  if (!confirm('确定要删除该音色吗？此操作不可撤销。')) return;
  try {
    const resp = await fetch(`/api/cosyvoice/voices/${encodeURIComponent(voiceId)}`, { method: 'DELETE' });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(err.detail);
    }
    toast('音色已删除', 'success');
    await loadVoices();
  } catch (e) {
    toast(`删除失败: ${e.message}`, 'error');
  }
}

// ===== Upload History =====
async function loadHistory() {
  try {
    const resp = await fetch('/api/uploads');
    const data = await resp.json();
    const sel = document.getElementById('history-select');
    sel.innerHTML = '<option value="">历史音频…</option>';
    (data.files || []).forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.filename;
      opt.textContent = `${f.filename} (${formatBytes(f.size)})`;
      sel.appendChild(opt);
    });

}

// ===== Default Texts =====
let _defaultTexts = [];

async function loadDefaultTexts() {
  try {
    const resp = await fetch('/api/default-texts');
    _defaultTexts = await resp.json();
    const sel = document.getElementById('default-text-select');
    _defaultTexts.forEach((item, i) => {

    });

}

function onDefaultTextSelect(sel) {
  const idx = sel.value;
  if (idx === '' || !_defaultTexts[idx]) return;
  document.getElementById('tts-text').value = _defaultTexts[idx].text.trimEnd();
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

async function onFileSelected(input) {
  const file = input.files[0];
  if (!file) return;

  document.getElementById('file-label').textContent = file.name;
  document.getElementById('history-select').value = '';

  const fd = new FormData();
  fd.append('file', file);
  try {
    await fetch('/api/upload', { method: 'POST', body: fd });
    await loadHistory();
  } catch (e) {}

  currentAudioFile = file;
  loadAudioFromFile(file);
}

async function onHistorySelect(sel) {
  const filename = sel.value;
  if (!filename) return;
  document.getElementById('file-label').textContent = filename;
  document.getElementById('audio-file-input').value = '';
  const url = `/api/uploads/${encodeURIComponent(filename)}`;
  currentAudioFile = { url, name: filename };
  loadAudioFromUrl(url);
}

async function loadAudioFromFile(file) {
  const arrayBuffer = await file.arrayBuffer();
  decodeAudio(arrayBuffer);
}

async function loadAudioFromUrl(url) {
  try {
    const resp = await fetch(url);
    const arrayBuffer = await resp.arrayBuffer();
    decodeAudio(arrayBuffer);
  } catch (e) {
    toast('加载音频失败', 'error');
  }
}

async function decodeAudio(arrayBuffer) {
  if (!audioCtx) audioCtx = new AudioContext();
  try {
    audioBuffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
    audioDuration = audioBuffer.duration;
    clipStart = 0;
    clipEnd = audioDuration;
    waveformData = computeWaveformData(audioBuffer);
    drawWaveform();
    updateClipTimeInfo();
    document.getElementById('btn-preview').disabled = false;
    document.getElementById('btn-reset-clip').disabled = false;
    checkCreateReady();
  } catch (e) {
    toast('音频解码失败，请检查文件格式', 'error');
  }
}

// ===== Waveform =====
function computeWaveformData(buf) {
  const canvas = document.getElementById('waveform');
  const numBins = canvas.width || 600;
  const ch = buf.getChannelData(0);
  const spb = Math.floor(ch.length / numBins);
  const data = new Float32Array(numBins);
  for (let i = 0; i < numBins; i++) {
    let max = 0;
    for (let j = 0; j < spb; j++) {
      const a = Math.abs(ch[i * spb + j] || 0);
      if (a > max) max = a;
    }
    data[i] = max;
  }
  return data;
}

function initCanvas() {
  const canvas = document.getElementById('waveform');
  const wrap = document.getElementById('waveform-wrap');

  function resize() {
    canvas.width = wrap.clientWidth;
    canvas.height = 100;
    if (waveformData && audioBuffer) {
      waveformData = computeWaveformData(audioBuffer);
    }
    drawWaveform();
  }
  new ResizeObserver(resize).observe(wrap);
  resize();

  canvas.addEventListener('mousedown', onCanvasMouseDown);
  canvas.addEventListener('mousemove', onCanvasMouseMove);
  canvas.addEventListener('mouseup', onCanvasMouseUp);
  canvas.addEventListener('mouseleave', onCanvasMouseUp);

  canvas.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    onCanvasMouseDown({ clientX: touch.clientX, clientY: touch.clientY, target: canvas, _rect: rect });
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    const touch = e.touches[0];
    onCanvasMouseMove({ clientX: touch.clientX });
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', onCanvasMouseUp);

  drawWaveform();
}

function drawWaveform() {
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#f8fafc';
  ctx.fillRect(0, 0, w, h);

  if (!waveformData) {
    ctx.fillStyle = '#cbd5e1';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('请上传音频文件', w / 2, h / 2);
    return;
  }

  const startX = (clipStart / audioDuration) * w;
  const endX = (clipEnd / audioDuration) * w;

  ctx.fillStyle = 'rgba(8,145,178,0.08)';
  ctx.fillRect(startX, 0, endX - startX, h);

  const numBins = waveformData.length;
  const barW = w / numBins;
  for (let i = 0; i < numBins; i++) {
    const x = i * barW;
    const amp = waveformData[i];
    const barH = Math.max(2, amp * (h - 4));
    const y = (h - barH) / 2;
    const isIn = x >= startX && x <= endX;
    ctx.fillStyle = isIn ? '#0891b2' : '#cbd5e1';
    ctx.fillRect(x + 0.5, y, Math.max(1, barW - 1), barH);
  }

  const drawHandle = (xPos, label, isLeft) => {
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(xPos, 0);
    ctx.lineTo(xPos, h);
    ctx.stroke();

    const gw = 10, gh = 20;
    const gx = isLeft ? xPos : xPos - gw;
    const gy = (h - gh) / 2;
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.roundRect(gx, gy, gw, gh, 3);
    ctx.fill();

    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 11px monospace';
    ctx.textBaseline = 'top';
    ctx.textAlign = isLeft ? 'left' : 'right';
    ctx.fillText(label, isLeft ? xPos + 13 : xPos - 13, 3);
  };

  drawHandle(startX, formatTime(clipStart), true);
  drawHandle(endX, formatTime(clipEnd), false);

  if (endX - startX > 60) {
    ctx.fillStyle = 'rgba(8,145,178,.6)';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`${formatTime(clipEnd - clipStart)}`, (startX + endX) / 2, h - 3);
  }

  const playPos = getPreviewProgress();
  if (playPos !== null) {
    const px = (playPos / audioDuration) * w;
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px, h);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#f59e0b';
    ctx.font = 'bold 11px monospace';
    ctx.textBaseline = 'bottom';
    ctx.textAlign = px > w / 2 ? 'right' : 'left';
    ctx.fillText(formatTime(playPos), px + (px > w / 2 ? -4 : 4), h - 3);
  }
}

function onCanvasMouseDown(e) {
  if (!waveformData) return;
  const canvas = document.getElementById('waveform');
  const rect = e._rect || canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const startFrac = clipStart / audioDuration;
  const endFrac = clipEnd / audioDuration;
  const threshold = 12 / canvas.width;
  if (Math.abs(x - startFrac) < threshold) {
    dragging = 'left';
  } else if (Math.abs(x - endFrac) < threshold) {
    dragging = 'right';
  }
}

function onCanvasMouseMove(e) {
  if (!dragging || !waveformData) return;
  const canvas = document.getElementById('waveform');
  const rect = canvas.getBoundingClientRect();
  const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const t = x * audioDuration;
  const minGap = 0.1;
  if (dragging === 'left') {
    clipStart = Math.max(0, Math.min(t, clipEnd - minGap));
  } else {
    clipEnd = Math.min(audioDuration, Math.max(t, clipStart + minGap));
  }
  drawWaveform();
  updateClipTimeInfo();
}

function onCanvasMouseUp() { dragging = null; }

function updateClipTimeInfo() {
  const info = document.getElementById('clip-time');
  if (!waveformData) {
    info.textContent = '请上传音频文件';
    return;
  }
  info.textContent = `剪辑: ${formatTime(clipStart)} ~ ${formatTime(clipEnd)}  时长: ${formatTime(clipEnd - clipStart)}  (总时长: ${formatTime(audioDuration)})`;
}

function resetClip() {
  if (!audioBuffer) return;
  clipStart = 0;
  clipEnd = audioDuration;
  drawWaveform();
  updateClipTimeInfo();
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = (secs % 60).toFixed(1).padStart(4, '0');
  return `${m}:${s}`;
}

// ===== Preview =====
let previewStartTime = 0;
let previewRafId = null;

function togglePreview() {
  if (!audioBuffer) return;
  if (previewSource) {
    stopPreview();
    return;
  }
  if (!audioCtx) audioCtx = new AudioContext();
  previewSource = audioCtx.createBufferSource();
  previewSource.buffer = audioBuffer;
  previewSource.connect(audioCtx.destination);
  previewSource.start(0, clipStart, clipEnd - clipStart);
  previewStartTime = audioCtx.currentTime;

  previewSource.onended = () => stopPreview(false);
  document.getElementById('btn-preview').textContent = '⬛ 停止';
  startPreviewRaf();
}

function stopPreview(stopSource = true) {
  if (stopSource && previewSource) {
    try { previewSource.stop(); } catch (_) {}
  }
  previewSource = null;
  cancelAnimationFrame(previewRafId);
  previewRafId = null;
  document.getElementById('btn-preview').textContent = '▶ 试听片段';
  drawWaveform();
}

function startPreviewRaf() {
  function tick() {
    if (!previewSource) return;
    drawWaveform();
    previewRafId = requestAnimationFrame(tick);
  }
  previewRafId = requestAnimationFrame(tick);
}

function getPreviewProgress() {
  if (!previewSource || !audioCtx) return null;
  const elapsed = audioCtx.currentTime - previewStartTime;
  const pos = clipStart + elapsed;
  return pos > clipEnd ? null : pos;
}

// ===== Create Voice =====
function checkCreateReady() {
  const nameOk = /^[a-z0-9]{1,10}$/.test(document.getElementById('voice-name').value);
  const audioOk = !!audioBuffer;
  document.getElementById('btn-create').disabled = !(nameOk && audioOk);
}

document.getElementById('voice-name').addEventListener('input', function () {
  const ok = /^[a-z0-9]*$/.test(this.value);
  this.classList.toggle('invalid', !ok && this.value.length > 0);
  checkCreateReady();
});

async function createVoice() {
  const name = document.getElementById('voice-name').value.trim();
  if (!/^[a-z0-9]{1,10}$/.test(name)) {
    toast('音色名称只能包含小写字母和数字，最多 10 个字符', 'error');
    return;
  }
  if (!audioBuffer) {
    toast('请先上传音频文件', 'error');
    return;
  }

  const btn = document.getElementById('btn-create');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> 创建中… (需约 1 分钟)';

  try {
    const audioData = await getClippedAudioBase64();
    const targetModel = document.getElementById('tts-model-select').value;

    const resp = await fetch('/api/cosyvoice/voices', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ voice_name: name, audio_data: audioData, target_model: targetModel }),
    });

    const data = await resp.json();
    if (!resp.ok) {
      throw new Error(data.detail || '创建失败');
    }

    const { voice_id, status } = data;
    if (status === 'OK') {
      toast(`音色创建成功！ID: ${voice_id}`, 'success', 6000);
    } else if (status === 'DEPLOYING') {
      toast(`音色已提交审核，请稍后刷新列表查看状态。ID: ${voice_id}`, 'info', 8000);
    } else {
      toast(`音色审核未通过，请检查音频质量`, 'error');
    }

    document.getElementById('voice-name').value = '';
    checkCreateReady();
    await loadVoices();
  } catch (e) {
    toast(`创建音色失败: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '创建音色';
    checkCreateReady();
  }
}

// ===== Audio WAV Encoder =====
async function getClippedAudioBase64() {
  const startSample = Math.floor(clipStart * audioBuffer.sampleRate);
  const endSample = Math.floor(clipEnd * audioBuffer.sampleRate);
  const numSamples = endSample - startSample;
  const sampleRate = audioBuffer.sampleRate;
  const bytesPerSample = 2;
  const numChannels = 1;

  const buf = new ArrayBuffer(44 + numSamples * bytesPerSample);
  const view = new DataView(buf);

  const ws = (offset, str) => {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  };

  ws(0, 'RIFF');
  view.setUint32(4, 36 + numSamples * bytesPerSample, true);
  ws(8, 'WAVE');
  ws(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
  view.setUint16(32, numChannels * bytesPerSample, true);
  view.setUint16(34, 16, true);
  ws(36, 'data');
  view.setUint32(40, numSamples * bytesPerSample, true);

  const channels = [];
  for (let c = 0; c < audioBuffer.numberOfChannels; c++) {
    channels.push(audioBuffer.getChannelData(c));
  }

  let offset = 44;
  for (let i = startSample; i < endSample; i++) {
    let sum = 0;
    for (const ch of channels) sum += (ch[i] || 0);
    const s = Math.max(-1, Math.min(1, sum / channels.length));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset += 2;
  }

  const bytes = new Uint8Array(buf);
  let binary = '';
  const chunkSize = 8192;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }
  return `data:audio/wav;base64,${btoa(binary)}`;
}
